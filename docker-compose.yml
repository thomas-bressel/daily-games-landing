services:
  daily-games:
    container_name: daily-games-app
    image: ${DOCKERHUB_USERNAME}/daily-games:latest
    restart: unless-stopped
    expose:
      - "2000"
    networks:
      - daily-games-net
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: daily-games-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - daily-games
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - daily-games-net
    command: >
      sh -c "
      echo '
      server {
        listen 80;
        server_name daily-games www.daily-games;
        return 301 https://\$$host\$$request_uri;
      }

      server {
        listen 443 ssl;
        server_name daily-games www.daily-games;

        ssl_certificate /etc/letsencrypt/live/daily-games/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/daily-games/privkey.pem;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection \"1; mode=block\";
        add_header Strict-Transport-Security \"max-age=63072000; includeSubDomains; preload\";

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied expired no-cache no-store private must-revalidate auth;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

        location / {
          proxy_pass http://daily-games:3002;
          proxy_http_version 1.1;
          proxy_set_header Host \$$host;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection upgrade;
          proxy_set_header X-Real-IP \$$remote_addr;
          proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto \$$scheme;
          proxy_cache_bypass \$$http_upgrade;
          
          # Timeouts
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
        }

        # Cache static files
        location /_next/static/ {
          proxy_pass http://daily-games:3000;
          proxy_cache_valid 1y;
          add_header Cache-Control \"public, immutable\";
        }

        # Cache images
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
          proxy_pass http://daily-games:3002;
          proxy_cache_valid 30d;
          add_header Cache-Control \"public\";
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
      "
      
networks:
  daily-games-net:
    name: daily-games-net
    driver: bridge