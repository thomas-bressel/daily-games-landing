services:
  daily-games:
    container_name: daily-games-app-dev
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "2000:2000"  # Accès direct sans nginx
    networks:
      - daily-games-dev-net
    environment:
      - NODE_ENV=development
    # Volumes pour le hot reload
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules  # Évite d'écraser node_modules
      - /app/.next  # Évite d'écraser le build

  # Configuration nginx simplifiée pour le dev (optionnel)
  nginx-dev:
    image: nginx:alpine
    container_name: daily-games-nginx-dev
    restart: unless-stopped
    ports:
      - "8080:80"  # Port différent pour éviter les conflits
    depends_on:
      - daily-games
    networks:
      - daily-games-dev-net
    command: >
      sh -c "
      echo '
      server {
        listen 80;
        server_name localhost;

        location / {
          proxy_pass http://daily-games:2000;
          proxy_http_version 1.1;
          proxy_set_header Host \$$host;
          proxy_set_header X-Real-IP \$$remote_addr;
          proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto \$$scheme;
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
      "
      
networks:
  daily-games-dev-net:
    name: daily-games-dev-net
    driver: bridge